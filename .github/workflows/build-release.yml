name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Commit dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: rebuild dist"
          git push

      # Dogfood the action itself with the just-built dist/.
      - uses: ./
        with:
          api_key: ${{ secrets.APIALERTS_API_KEY }}
          event: ci.release.success
          channel: developer
          message: 'notify-action - main build success'
          tags: CI/CD,GitHub-Action,Release
          link: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
