name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    name: Verify Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check src/run.ts VERSION matches git tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CODE=$(grep -E "^export const VERSION" src/run.ts | sed -E "s/.*'([^']+)'.*/\1/")
          if [ "$TAG" != "$CODE" ]; then
            echo "::error::tag v$TAG does not match src/run.ts VERSION=$CODE"
            exit 1
          fi

      - name: Check package.json version matches git tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version=$PKG"
            exit 1
          fi

  bump-floating-tag:
    name: Move floating major tag
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move v<MAJOR> to point at this commit
        run: |
          MAJOR=$(echo "${GITHUB_REF_NAME}" | sed -E 's/^v([0-9]+)\..*/v\1/')
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR" -m "Move $MAJOR to ${GITHUB_REF_NAME}"
          git push origin "$MAJOR" --force

  notify:
    name: Send Publish Alert
    needs: bump-floating-tag
    runs-on: ubuntu-latest
    steps:
      - uses: apialerts/notify-action@v2
        with:
          api_key: ${{ secrets.APIALERTS_API_KEY }}
          event: ci.integration.publish.notify-action
          channel: releases
          message: 'notify-action ${{ github.ref_name }} published'
          tags: CI/CD,GitHub-Action,Publish
          link: ${{ format('{0}/{1}/releases/tag/{2}', github.server_url, github.repository, github.ref_name) }}
